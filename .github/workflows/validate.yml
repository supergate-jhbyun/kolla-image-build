name: Validate scaffold

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository configuration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate build matrix JSON
        run: python3 -m json.tool config/build-matrix.json >/dev/null

      - name: Validate core profile JSON
        run: python3 -m json.tool config/profiles/core.json >/dev/null

      - name: Validate repository configuration
        run: python3 scripts/validate-config.py

      - name: Validate publish planner dry run
        run: python3 scripts/plan-publish.py --profile core --release 2025.1 --distro rocky --distro-version 9 --dry-run >/dev/null

      - name: Run tests
        run: python3 -m unittest discover -s tests -v
